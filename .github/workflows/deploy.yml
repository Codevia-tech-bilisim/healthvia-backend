name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: healthvia-beta
  REGION: europe-west1
  REPO: healthvia-repo
  IMAGE: healthvia-backend
  SERVICE: healthvia-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
                       -t europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest .

      - name: Push Docker image
        run: |
          docker push europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          flags: |
            --port=8080
            --memory=1Gi
            --cpu=1
            --min-instances=1
            --max-instances=4
            --timeout=300s
            --allow-unauthenticated
          env_vars: |
            SPRING_PROFILES_ACTIVE=prod
            APP_SEED_DEMO_TEAM=true
            IYZICO_API_KEY=${{ secrets.IYZICO_API_KEY }}
            IYZICO_SECRET_KEY=${{ secrets.IYZICO_SECRET_KEY }}
            IYZICO_BASE_URL=${{ secrets.IYZICO_BASE_URL || 'https://sandbox-api.iyzipay.com' }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            CONTACT_EMAIL=info@codevia.tech
          secrets: |
            MONGODB_URI=MONGODB_URI:latest
            JWT_SECRET=JWT_SECRET:latest
            ZOOM_CLIENT_ID=ZOOM_CLIENT_ID:latest
            ZOOM_CLIENT_SECRET=ZOOM_CLIENT_SECRET:latest
            ZOOM_ACCOUNT_ID=ZOOM_ACCOUNT_ID:latest
            PAYLOAD_SYNC_API_KEY=PAYLOAD_SYNC_API_KEY:latest
