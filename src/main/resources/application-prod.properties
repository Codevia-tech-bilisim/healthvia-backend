spring.application.name=healthvia-platform

# ========================================
# PRODUCTION CONFIGURATION
# ========================================

# MongoDB Atlas Configuration
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# JWT Configuration (Environment Variables)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# ========================================
# ZOOM INTEGRATION
# ========================================
zoom.client-id=${ZOOM_CLIENT_ID}
zoom.client-secret=${ZOOM_CLIENT_SECRET}
zoom.account-id=${ZOOM_ACCOUNT_ID}
zoom.webhook-secret=${ZOOM_WEBHOOK_SECRET:}
zoom.base-url=https://api.zoom.us/v2
zoom.oauth-url=https://zoom.us/oauth/token

# ========================================
# PRODUCTION SECURITY SETTINGS
# ========================================

# Error Handling - Hide sensitive details in production
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never

# ========================================
# CORS Configuration
# ========================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://healthvia.com,https://www.healthvia.com,https://app.healthvia.com}
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ========================================
# LOGGING - Production Levels
# ========================================
logging.level.root=WARN
logging.level.com.healthvia.platform=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.mongodb.driver=WARN

# JSON Logging for Cloud environments
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%p","logger":"%c","message":"%m"}%n

# ========================================
# JACKSON JSON Configuration
# ========================================
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=UTC

# ========================================
# FILE UPLOAD
# ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# ACTUATOR & HEALTH CHECKS
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.mongo.enabled=true

# ========================================
# COMPRESSION
# ========================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# ========================================
# PERFORMANCE TUNING
# ========================================
spring.web.resources.add-mappings=false
spring.cloud.config.enabled=false

# Connection pool settings
spring.data.mongodb.max-connection-idle-time=60000
spring.data.mongodb.max-connection-life-time=0
spring.data.mongodb.max-wait-time=120000

# ========================================
# SECURITY HEADERS
# ========================================
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
