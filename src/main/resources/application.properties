spring.application.name=platform

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://admin:healthvia123@localhost:27017/healthvia?authSource=admin
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B59703373367639792442264529482B4D6251655468576D5A7134743777217A25432A
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Server Configuration.
server.port=8080
server.servlet.context-path=/

# Error handling - Hata detaylarını göster.
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

# Logging
logging.level.com.healthvia.platform=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.mongodb.driver=INFO

# Jackson Configuration
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Validation
spring.web.resources.add-mappings=false

# Cloud config
spring.cloud.config.enabled=false

# Mail Configuration (Dev - MailHog veya Mailtrap)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Contact Form
contact.recipient-email=info@codevia.tech

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# iyzico Payment Configuration (Sandbox)
iyzico.api-key=sandbox-Is4oGnpPOnHGv5Ri9O1RGVTrlGu4scnE
iyzico.secret-key=sandbox-GX2ll97BUNQsAHnUAgpTVHy2uKQRFjyW
iyzico.base-url=https://sandbox-api.iyzipay.com

# Payload CMS Sync API Key
payload.sync.api-key=hv-sync-dev-key-2024
# Payment / iyzico callback URLs
payment.public-base-url=http://localhost:3001
payment.api-base-url=http://localhost:8080

# Demo data seeding (dev only)
app.seed.demo-leads=true

# === Email channel (IMAP poll + SMTP send) ===
# Set enabled=true and provide IMAP + SMTP credentials to activate.
email.channel.enabled=false
email.imap.host=imap.gmail.com
email.imap.port=993
email.imap.username=
email.imap.password=
email.imap.folder=INBOX
email.imap.protocol=imaps
email.poll.interval-ms=30000
# spring.mail.host, spring.mail.port, spring.mail.username, spring.mail.password
# already configured for MailHog in dev — override for production SMTP.

# === Telegram channel (long-poll Bot API) ===
# Get a bot token from @BotFather. Then set enabled=true.
telegram.channel.enabled=false
telegram.bot-token=
telegram.poll.timeout-seconds=25
app.seed.demo-team=true
app.seed.demo-password=demo123
